    <script>
        // 1. Add two numbers
function add(a, b) {
  return a + b;
}
console.log(add(4, 6)); // 10


// 2. Even or Odd
function checkNumber(num) {
  return num % 2 === 0 ? "Even" : "Odd";
}
console.log(checkNumber(7)); // Odd


// 3. Final Price
function finalPrice(price, discount) {
  return price - discount;
}
console.log(finalPrice(1000, 200)); // 800


// 4. Minutes to Seconds (Arrow Function)
const toSeconds = (minutes) => minutes * 60;
console.log(toSeconds(5)); // 300


// 5. Pass or Fail
function result(marks) {
  return marks >= 40 ? "Pass" : "Fail";
}
console.log(result(55)); // Pass
    </script>
