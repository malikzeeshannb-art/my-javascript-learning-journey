<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-=device-width,initial-scale=1.0">
    <title>return value function</title>
</head>
<body>
    <script>
        // Return values in JavaScript

function add(a, b) {
  return a + b;
}

let result1 = add(4, 6);
console.log(result1); // 10

function multiply(x, y) {
  return x * y;
}

let result2 = multiply(3, 4);
console.log(result2); // 12

function square(n) {
  return n * n;
}

let result3 = square(5);
console.log(result3); // 25
    </script>
</body>
</html>
