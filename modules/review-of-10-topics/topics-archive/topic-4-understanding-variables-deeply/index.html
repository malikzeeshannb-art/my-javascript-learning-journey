<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>understanding variables deeply</title>
</head>
<body>
    <script>
        let x = 5; // Declare a variable
        const y = 10; // Declare a constant
        var z = 15; // Declare a variable (function-scoped)

        console.log(x + y + z); // Output: 30   
    </script>
</body>
</html>
