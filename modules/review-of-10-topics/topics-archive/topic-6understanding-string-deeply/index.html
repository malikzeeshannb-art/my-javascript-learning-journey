<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>understanding Strings deeply</title>
</head>
<body>
    <script>
        // ========== STRING BASICS ==========
        let str = "Hello, World!";
                console.log(str); // Output: Hello, World!
        console.log("username: " + "John"); // Output: username: John
        console.log(`The value of x is: ${5 + 10}`); // Output: The value of x is: 15

        // ========== STRING CONCATENATION ==========
        let firstName = "John";
        let lastName = "Doe";
        let fullName = firstName + " " + lastName;
        console.log(fullName); // Output: John Doe
        let greeting = `Hello, ${firstName} ${lastName}!`;
        console.log(greeting); // Output: Hello, John Doe!

        // ========== STRING LENGTH ==========
        console.log(str.length); // Output: 13
        console.log("JavaScript".length); // Output: 10

        // ========== ACCESSING CHARACTERS ==========
        console.log(str[0]); // Output: H
        console.log(str.charAt(1)); // Output: e
        console.log(str.charCodeAt(0)); // Output: 72 (ASCII code for 'H')

        // ========== STRING CASE CONVERSION ==========
        console.log(str.toUpperCase()); // Output: HELLO, WORLD!
        console.log(str.toLowerCase()); // Output: hello, world!

        // ========== STRING METHODS - SEARCH ==========
        console.log(str.indexOf("World")); // Output: 7
        console.log(str.indexOf("xyz")); // Output: -1 (not found)
        console.log(str.includes("World")); // Output: true
        console.log(str.startsWith("Hello")); // Output: true
        console.log(str.endsWith("!")); // Output: true

        // ========== STRING METHODS - EXTRACT ==========
        console.log(str.slice(0, 5)); // Output: Hello
        console.log(str.substring(7, 12)); // Output: World
        console.log(str.substr(7, 5)); // Output: World
        console.log(str.split(", ")); // Output: ["Hello", "World!"]

        // ========== STRING METHODS - REPLACE ==========
        console.log(str.replace("World", "JavaScript")); // Output: Hello, JavaScript!
        console.log(str.replace("!", ".")); // Output: Hello, World.
        console.log("Hello Hello".replaceAll("Hello", "Hi")); // Output: Hi Hi

        // ========== STRING METHODS - TRIM ==========
        let spaced = "  Hello World  ";
        console.log(spaced.trim()); // Output: Hello World
        console.log(spaced.trimStart()); // Output: Hello World  
        console.log(spaced.trimEnd()); // Output:   Hello World

        // ========== STRING METHODS - REPEAT & PADDING ==========
        console.log("Ha".repeat(3)); // Output: HaHaHa
        console.log("5".padStart(3, "0")); // Output: 005
        console.log("5".padEnd(3, "0")); // Output: 500

        // ========== STRING METHODS - MATCH & SPLIT ==========
        let text = "apple,banana,cherry";
        console.log(text.split(",")); // Output: ["apple", "banana", "cherry"]
        let sentence = "The quick brown fox";
        console.log(sentence.split(" ")); // Output: ["The", "quick", "brown", "fox"]

        // ========== TEMPLATE LITERALS - ADVANCED ==========
        let name = "Alice";
        let age = 25;
        let message = `${name} is ${age} years old`;
        console.log(message); // Output: Alice is 25 years old
        
        let multiline = `This is a
        multiline
        string`;
        console.log(multiline); // Output: This is a\n multiline\n string

        // ========== STRING IMMUTABILITY ==========
        let original = "Hello";
        let modified = original.replace("H", "J");
        console.log(original); // Output: Hello (unchanged)
        console.log(modified); // Output: Jello

        // ========== STRING COMPARISON ==========
        console.log("apple" === "apple"); // Output: true
        console.log("apple" < "banana"); // Output: true
        console.log("A" < "a"); // Output: true (uppercase comes before lowercase)

        // ========== ESCAPE SEQUENCES ==========
        console.log("Hello\nWorld"); // Output: Hello (new line) World
        console.log("Hello\tWorld"); // Output: Hello (tab) World
        console.log("He said \"Hi\""); // Output: He said "Hi"
        console.log('It\'s a string'); // Output: It's a string
        console.log("Path: C:\\Users\\Name"); // Output: Path: C:\Users\Name
    </script>
</body>
</html>
