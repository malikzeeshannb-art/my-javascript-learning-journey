<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>understanding Data types deeply</title>
</head>
<body>
    <script>
        let userName = "shani" //now the username has a string value and the data type of the username is string
        console.log(typeof userName) //string
        userName = 1234 //now the username has a number value and the data type of the username is number
        console.log(typeof userName) //number
        let age = 25 //now the age has a number value and the data type of the age is number
        console.log(typeof age) //number
        age = "twenty five" //now the age has a string value and the data type of the age is string
        console.log(typeof age) //string
        let isStudent = true //now the isStudent has a boolean value and the data type of the isStudent is boolean
        console.log(typeof isStudent) //boolean
        isStudent = "yes" //now the isStudent has a string value and the data type of the isStudent is string
        console.log(typeof isStudent) //string  
        
    </script>
</body>
</html>
