<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing 1 to 10 with For Loop</title>
</head>
<body>
    <h1>JavaScript Day 22 — For Loop Practice</h1>
    <p>Open the browser console to see the loop output.</p>

    <script>
        // Day 22 practice: For loop
        // Goal: print numbers from 1 to 10

        for (let x = 1; x <= 10; x++) {
            console.log("The current value of x is:", x);
        }

        // for loop structure:
        // for (start; condition; increment)
        // start     -> let x = 1
        // condition -> x <= 10
        // increment -> x++

        console.log("Loop completed successfully.");

        // Extra note:
        // This loop runs 10 times because x starts at 1 and stops after 10.
    </script>
</body>
</html>
