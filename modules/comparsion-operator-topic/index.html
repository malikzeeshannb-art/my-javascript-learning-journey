<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comparison Operators</title>
</head>
<body>
    <script>
        // ========== COMPARISON OPERATORS ==========
        console.log(5 > 3); // Output: true
        console.log(5 < 3); // Output: false
        console.log(5 >= 5); // Output: true
        console.log(5 <= 4); // Output: false
        console.log(5 === 5); // Output: true
        console.log(5 !== 5); // Output: false
    </script>
</body>
</html>
