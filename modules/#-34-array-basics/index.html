<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=0.1">
        <title>#34-Array Basics</title>
    </head>
    <body>
        <h1>Array Basics</h1>
        <h3>Understanding Arrays in JavaScript</h3>
        <script>
           // Day 34 Practice — Arrays Basics

let favoriteThings = ["banana", "apple", "BMW", "airplane", "iPhone"];

// Print full array
console.log("My Favorite Things:", favoriteThings);

// Access using index
console.log("First item (index 0):", favoriteThings[0]);
console.log("Second item (index 1):", favoriteThings[1]);

// Last item using length
let lastIndex = favoriteThings.length - 1;
console.log("Last item:", favoriteThings[lastIndex]);

// Total items
console.log("Total items:", favoriteThings.length);
        </script>
    </body>
</html>
