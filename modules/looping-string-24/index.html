<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>looping string</title>
</head>
<body>
    <script>
       // Day 24 Practice — Looping Strings

let name = "Zeeshan";

// 1) Access characters one by one by index
console.log("First character:", name[0]);
console.log("Second character:", name[1]);
console.log("Third character:", name[2]);

// 2) Print each character of the string using a for loop
console.log("Printing each character one by one:");

for (let i = 0; i < name.length; i++) {
    console.log(name[i]);
}

// 3) Small practice check
console.log("Total characters:", name.length);

// 4) Manual index practice
let index = 0;
console.log("Character at index 0:", name[index]);

index++;
console.log("Character at index 1:", name[index]);

index++;
console.log("Character at index 2:", name[index]);

// 5) Extra practice with another name
let friendName = "Ali";

for (let i = 0; i < friendName.length; i++) {
    console.log(friendName[i]);
}
    </script>
</body>
</html>
