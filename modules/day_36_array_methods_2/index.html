<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Day 36 - Array Methods Practice</title>
</head>
<body>
    <script>
        // Day 36 - Array Methods Practice (slice & splice)

// understanding slice() -> copy part of array (no change in original)
let items = ["pen", "pencil", "eraser", "sharpener", "scale"];

// copy pencil and eraser
let stationaryItems = items.slice(1, 3);

console.log("Copied items:", stationaryItems); 
// expected: ["pencil", "eraser"]

// original array should remain same
console.log("Original items before splice:", items);


// now understanding splice() -> modify original array

// remove "eraser" and replace with "marker"
items.splice(2, 1, "marker");

console.log("Updated items after splice:", items);
// expected: ["pen", "pencil", "marker", "sharpener", "scale"]


// extra small practice (inserting items)
let fruits = ["apple", "banana", "mango"];

fruits.splice(2, 0, "grapes");   // insert at index 2
fruits.splice(3, 0, "pineapple"); // insert next

console.log("Fruits after practice:", fruits);
// expected: ["apple", "banana", "grapes", "pineapple", "mango"]
    </script>
</body>
</html>
