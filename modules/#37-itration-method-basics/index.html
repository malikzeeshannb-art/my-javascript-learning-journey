<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 37 - map() Practice</title>
</head>
<body>

    <h1>Day 37 - Array map() Practice</h1>

    <script>
        // original data
        let names = ["ali", "zain", "hamza", "jammal", "fahad", "hannan"];

        // convert names to uppercase
        let upperNames = names.map(function(name) {
            return name.toUpperCase();
        });

        // output in console
        console.log(upperNames);
    </script>

</body>
</html>
