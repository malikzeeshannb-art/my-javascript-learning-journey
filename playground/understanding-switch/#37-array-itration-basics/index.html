<!DOCTYPE html>

        <title>itration method map()</title>
    </head>
    <body>
        <h1>itration methods practice!</h1>
        <script>
            //example first!
            let weekDays = ["sunday", "monday", "tuesday", "wednesday"];
            let upperCase = weekDays.map(function(uper) {
                return uper.toUpperCase();
            });
            console.log(upperCase);

            //example second!
            let number = [1, 2, 3, 4, 5];
            let devider = number.map(function(devided) {
                return devided * 5;
            });
            console.log(devider);
