<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding Switch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Box</h1>
            <p>This is the box example.</p>
                </div>
        <script>
            let day = 3;
switch (day) {
  case 1:
    console.log("Monday");
    break;
    case 2:
        console.log("Tuesday");
        break;
    case 3:
        console.log("Wednesday");
        break;
  default:
    console.log("Invalid day");
}

let daya = 7;

switch (daya) {
  case 1:
    console.log("Monday");
    break;

  case 2:
    console.log("Tuesday");
    break;

  default:
    console.log("Invalid day");
}
        </script>
    </body>
</html>
