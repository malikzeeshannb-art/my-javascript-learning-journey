<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.1">
        <title>Addind & Removing Itemms From Array</title>
    </head>
    <body>
        <h1>Adding & Removing Week Days From An Array!</h1>
        <script>
            let weekDays = ["sunday", "monday", "tuesday", "wednesday", "thurstday"];
            weekDays.push("friday"); // this adds friday withi=out replacing the old code in array. 
            weekDays.pop(); // this 'REMOVE' the last items from array and also return the item that it has removed.
            let returnItem = weekDays.pop(); //.pop() is returming the item that it has remove earliar. 
            console.log(weekDays); // this prints the left items,
            console.log(returnItem); // this prints the 'Removed Item'
        </script>
    </body>
</html>
