            /* 1) Create these functions:
A — Calculator 8 */
            function colculate(a, b, operator) {
                if (operator === "+") {
                    return a + b;
                }
                if (operator === "-") {
                    return a - b;
                }
                 if (operator === "*") {
                    return a * b;
                 }
                 if (operator === "/") {
                    return a / b;
                 }
            }
            console.log(colculate(2, 3, "*")); // the output is the: 6
            
            // B — Number Analyzer 
             function analyzeNumber(num) {
                if (num % 2 === 0) {
                    return "posative even";
                }
               
                else if (num % -2 === 0) {
                    return "negative even";
                }
                
                

                 else { 
                    console.log("posative odd");
                }
             }
              console.log(analyzeNumber(-4))

              function finalPrice(price, discount) {

               function timeConverter(minuts) {

               // E — Grade Checker
               function gradeCheck(marks) {
                if (marks >= 85) {
                    console.log("congratulation you've got the first position");

                else if (marks >= 75) {
